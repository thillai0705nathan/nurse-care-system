<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings | CarePoint</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="member-portal.css" />
  <link rel="stylesheet" href="member-booking.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <div class="app-shell">

    <header class="app-topbar">
      <a class="topbar-back" href="member-home.html" aria-label="Back to Home">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <span class="topbar-title">My Bookings</span>
      <a class="topbar-action" href="member-nurses.html" aria-label="New booking">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </a>
    </header>

    <main class="app-main">

      <!-- Status Filter Tabs -->
      <div class="status-tabs" id="statusTabs">
        <button class="status-tab active" data-status="All">All</button>
        <button class="status-tab" data-status="Pending">Pending</button>
        <button class="status-tab" data-status="Confirmed">Confirmed</button>
        <button class="status-tab" data-status="Denied">Denied</button>
        <button class="status-tab" data-status="Cancelled">Cancelled</button>
      </div>

      <div class="loading-state" id="loadingState">
        <div class="loading-spinner"></div>
        <p>Loading your bookings…</p>
      </div>

      <div class="booking-list" id="bookingList"></div>

      <div class="empty-state" id="emptyState" hidden>
        <div class="empty-state-icon"><i class="fa-solid fa-calendar-days"></i></div>
        <h3>No bookings yet</h3>
        <p>Find a nurse and book your first appointment.</p>
        <a class="btn btn-primary" href="member-nurses.html">Find a Nurse</a>
      </div>

    </main>

    <nav class="app-bottomnav" id="bottomNavRoot"></nav>
  </div>

  <!-- Cancel Confirmation Modal -->
  <div class="modal-overlay" id="cancelModal" hidden>
    <div class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <h2 class="cancel-modal-title">Cancel this booking?</h2>
      <p class="cancel-modal-desc" id="cancelModalDesc"></p>
      <div class="cancel-modal-actions">
        <button class="btn btn-outline btn-block" id="cancelModalDismiss">Keep Booking</button>
        <button class="btn btn-primary btn-block cancel-confirm-btn" id="cancelModalConfirm">Yes, Cancel</button>
      </div>
    </div>
  </div>

  <!-- Rate Booking Modal -->
  <div class="modal-overlay" id="rateModal" hidden>
    <div class="modal-sheet">
      <div class="modal-drag-handle"></div>
      <h2 class="cancel-modal-title">Rate your experience</h2>
      <p class="cancel-modal-desc" id="rateModalDesc"></p>
      <div class="star-picker" id="starPicker">
        <button type="button" class="star-picker-btn" data-value="1"><i class="fa-solid fa-star"></i></button>
        <button type="button" class="star-picker-btn" data-value="2"><i class="fa-solid fa-star"></i></button>
        <button type="button" class="star-picker-btn" data-value="3"><i class="fa-solid fa-star"></i></button>
        <button type="button" class="star-picker-btn" data-value="4"><i class="fa-solid fa-star"></i></button>
        <button type="button" class="star-picker-btn" data-value="5"><i class="fa-solid fa-star"></i></button>
      </div>
      <div class="field-group">
        <label class="field-label" for="reviewInput">Review (optional)</label>
        <textarea id="reviewInput" class="field-textarea" rows="3" placeholder="How was your experience with this nurse?"></textarea>
      </div>
      <div class="cancel-modal-actions">
        <button class="btn btn-outline btn-block" id="rateModalDismiss">Not Now</button>
        <button class="btn btn-primary btn-block" id="rateModalSubmit">Submit Rating</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="../common/api-client.js"></script>
  <script src="member-nav.js?v=2"></script>
  <script src="member-booking.js?v=2"></script>
</body>
</html>
