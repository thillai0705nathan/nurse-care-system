<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Administrator Sign Up for the Nurse Management System." />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Sign Up | Nurse Management System</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=2" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  <!-- ========================================
       DECORATIVE BACKGROUND SHAPES
  ======================================== -->
  <div class="bg-shapes" aria-hidden="true">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="medical-icon icon-a">&#43;</div>
    <div class="medical-icon icon-b">&#43;</div>
    <div class="medical-icon icon-c">&#43;</div>
  </div>

  <!-- ========================================
       MAIN SIGNUP WRAPPER
  ======================================== -->
  <main class="login-wrapper" role="main">
    <div class="login-card" id="loginCard">

      <!-- ---- Card Header ---- -->
      <header class="card-header">
        <div class="logo-wrap" aria-label="Nurse Management System Logo">
          <div class="logo-circle">
            <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="24" cy="24" r="22" fill="#FCE4EC" stroke="#E91E63" stroke-width="2"/>
              <rect x="20" y="12" width="8" height="24" rx="3" fill="#E91E63"/>
              <rect x="12" y="20" width="24" height="8" rx="3" fill="#E91E63"/>
            </svg>
          </div>
        </div>

        <h1 class="card-title">Nurse Management System</h1>
        <p class="card-subtitle">Administrator Sign Up</p>

        <div class="header-divider" aria-hidden="true">
          <span class="divider-dot"></span>
          <span class="divider-line"></span>
          <span class="divider-dot"></span>
        </div>
      </header>

      <!-- ---- Sign Up Form ---- -->
      <form class="login-form" id="signupForm" novalidate aria-label="Admin Sign Up Form">

        <!-- Full Name -->
        <div class="form-group" id="fullNameGroup">
          <label class="form-label" for="fullNameInput">
            <span class="label-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="6.5" r="3.25" stroke="currentColor" stroke-width="1.5"/>
                <path d="M3.5 17c0-3 3-5 6.5-5s6.5 2 6.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            Full Name
          </label>
          <div class="input-wrap">
            <input type="text" id="fullNameInput" name="fullName" class="form-input" placeholder="e.g. Priya Sharma" autocomplete="name" aria-required="true" aria-describedby="fullNameError" />
            <span class="input-focus-bar" aria-hidden="true"></span>
          </div>
          <p class="form-error" id="fullNameError" role="alert" aria-live="polite"></p>
        </div>

        <!-- Email Field -->
        <div class="form-group" id="emailGroup">
          <label class="form-label" for="emailInput">
            <span class="label-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.5 5.5A1.5 1.5 0 014 4h12a1.5 1.5 0 011.5 1.5v9A1.5 1.5 0 0116 16H4a1.5 1.5 0 01-1.5-1.5v-9z" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2.5 5.5l7.5 5 7.5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            Email Address
          </label>
          <div class="input-wrap">
            <input type="email" id="emailInput" name="email" class="form-input" placeholder="admin@hospital.com" autocomplete="email" aria-required="true" aria-describedby="emailError" />
            <span class="input-focus-bar" aria-hidden="true"></span>
          </div>
          <p class="form-error" id="emailError" role="alert" aria-live="polite"></p>
        </div>

        <!-- Admin Invite Code -->
        <div class="form-group" id="inviteCodeGroup">
          <label class="form-label" for="inviteCodeInput">
            <span class="label-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="8" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M6.5 8V5.5a3.5 3.5 0 017 0V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>
            Admin Invite Code
          </label>
          <div class="input-wrap">
            <input type="text" id="inviteCodeInput" name="inviteCode" class="form-input" placeholder="Enter invite code" aria-required="true" aria-describedby="inviteCodeError" />
            <span class="input-focus-bar" aria-hidden="true"></span>
          </div>
          <p class="invite-code-hint">Demo invite code: <strong>ADMIN2026</strong></p>
          <p class="form-error" id="inviteCodeError" role="alert" aria-live="polite"></p>
        </div>

        <!-- Password Field -->
        <div class="form-group" id="passwordGroup">
          <label class="form-label" for="passwordInput">
            <span class="label-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="10" cy="13.5" r="1" fill="currentColor"/>
              </svg>
            </span>
            Password
          </label>
          <div class="input-wrap password-wrap">
            <input type="password" id="passwordInput" name="password" class="form-input" placeholder="Create a password" autocomplete="new-password" aria-required="true" aria-describedby="passwordError" />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility" aria-pressed="false">
              <svg class="eye-icon eye-open" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6S1.5 10 1.5 10z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 3l14 14M8.6 8.6A2.5 2.5 0 0012.4 11.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M6 5.1C3.9 6.3 2.2 8.3 1.5 10c1.2 3 4.5 6 8.5 6a9 9 0 004-.9M14 14a9 9 0 002.5-4c-1.2-3-4.5-6-8.5-6a9 9 0 00-1.5.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <span class="input-focus-bar" aria-hidden="true"></span>
          </div>
          <p class="password-strength-hint">At least 6 characters.</p>
          <p class="form-error" id="passwordError" role="alert" aria-live="polite"></p>
        </div>

        <!-- Confirm Password Field -->
        <div class="form-group" id="confirmPasswordGroup">
          <label class="form-label" for="confirmPasswordInput">
            <span class="label-icon" aria-hidden="true">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
                <path d="M7 9V6.5a3 3 0 016 0V9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <circle cx="10" cy="13.5" r="1" fill="currentColor"/>
              </svg>
            </span>
            Confirm Password
          </label>
          <div class="input-wrap password-wrap">
            <input type="password" id="confirmPasswordInput" name="confirmPassword" class="form-input" placeholder="Re-enter your password" autocomplete="new-password" aria-required="true" aria-describedby="confirmPasswordError" />
            <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle password visibility" aria-pressed="false">
              <svg class="eye-icon eye-open" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M1.5 10S4.5 4 10 4s8.5 6 8.5 6-3 6-8.5 6S1.5 10 1.5 10z" stroke="currentColor" stroke-width="1.5"/>
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              <svg class="eye-icon eye-closed" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M3 3l14 14M8.6 8.6A2.5 2.5 0 0012.4 11.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M6 5.1C3.9 6.3 2.2 8.3 1.5 10c1.2 3 4.5 6 8.5 6a9 9 0 004-.9M14 14a9 9 0 002.5-4c-1.2-3-4.5-6-8.5-6a9 9 0 00-1.5.1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
            <span class="input-focus-bar" aria-hidden="true"></span>
          </div>
          <p class="form-error" id="confirmPasswordError" role="alert" aria-live="polite"></p>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-login" id="signupBtn" aria-label="Create administrator account">
          <span class="btn-text">Create Account</span>
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 10h12M11 5l5 5-5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="btn-spinner" aria-hidden="true"></span>
          <span class="ripple-container" aria-hidden="true"></span>
        </button>

      </form>

      <p class="signup-prompt">Already have an account? <a href="admin-login.html">Sign In</a></p>

      <!-- ---- Card Footer ---- -->
      <footer class="card-footer">
        <p class="footer-text">
          <svg class="lock-small" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="#E91E63" stroke-width="1.2"/>
            <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="#E91E63" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Secured with 256-bit SSL encryption
        </p>
        <p class="footer-copy">&copy; 2026 Nurse Management System. All rights reserved.</p>
      </footer>

    </div>
  </main>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="../common/api-client.js"></script>
  <script src="admin-signup.js?v=2"></script>
</body>
</html>
