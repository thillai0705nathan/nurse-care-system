<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Care Platform</title>
  
  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="page-container">
    <!-- Header Section -->
    <header class="header">
      <div class="logo-placeholder">
         <svg class="logo-icon" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="28" cy="28" r="26" fill="#FCE4EC" stroke="#E91E63" stroke-width="2.5"/>
            <rect x="23" y="13" width="10" height="30" rx="4" fill="#E91E63"/>
            <rect x="13" y="23" width="30" height="10" rx="4" fill="#E91E63"/>
            <circle cx="28" cy="28" r="5" fill="#FFF"/>
         </svg>
      </div>
      <h1 class="main-title">Nurse Care Platform</h1>
      <p class="subtitle">Please choose your portal to continue</p>
    </header>

    <!-- Selection Cards Container -->
    <main class="cards-container">
      
      <!-- Left Card: Admin Portal -->
      <div class="portal-card admin-card">
        <h2>Admin Portal</h2>
        <ul class="feature-list">
          <li>Dashboard</li>
          <li>Add Nurses</li>
          <li>Manage Schedule</li>
          <li>Real-Time Sync</li>
        </ul>
        <a href="admin-login.html" class="btn btn-white">Enter Admin Portal</a>
      </div>

      <!-- Right Card: Member Portal -->
      <div class="portal-card member-card">
        <h2>Member Portal</h2>
        <ul class="feature-list">
          <li>View Available Nurses</li>
          <li>Filter Part-Time/Full-Time</li>
          <li>Book Services</li>
          <li>Notifications</li>
        </ul>
        <a href="member-login.html" class="btn btn-pink">Enter Member Portal</a>
      </div>

    </main>
  </div>

  <script src="index.js"></script>
</body>
</html>
